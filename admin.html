<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nasma | Administration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 text-[#1a3a5f] p-6">

    <div class="max-w-md mx-auto">
        <header class="mb-8 flex justify-between items-center">
            <h1 class="text-2xl font-black italic">NASMA ADMIN</h1>
            <a href="index.html" class="text-xs font-bold text-blue-600">Voir le site 🌐</a>
        </header>

        <div class="bg-white p-8 rounded-[32px] shadow-xl border border-blue-50">
            <h2 class="text-lg font-bold mb-6">Ajouter un délice</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-bold uppercase mb-2">Nom du produit</label>
                    <input type="text" id="titre" placeholder="ex: Cake Citron" class="w-full p-4 bg-gray-50 rounded-2xl border-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div>
                    <label class="block text-[10px] font-bold uppercase mb-2">Prix (CFA)</label>
                    <input type="number" id="prix" placeholder="2000" class="w-full p-4 bg-gray-50 rounded-2xl border-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div>
                    <label class="block text-[10px] font-bold uppercase mb-2">Catégorie</label>
                    <select id="categorie" class="w-full p-4 bg-gray-50 rounded-2xl border-none">
                        <option value="Cake">Cake</option>
                        <option value="Jus">Jus Naturel</option>
                        <option value="Milkshake">Milkshake</option>
                        <option value="Yaourt">Yaourt</option>
                    </select>
                </div>

                <div>
                    <label class="block text-[10px] font-bold uppercase mb-2">Photo ou Vidéo</label>
                    <input type="file" id="fichier" accept="image/*,video/*" class="w-full text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                </div>

                <button onclick="publierArticle()" id="btn-publier" class="w-full bg-[#1a3a5f] text-white font-bold py-5 rounded-2xl shadow-lg active:scale-95 transition-transform mt-4">
                    PUBLIER MAINTENANT
                </button>
            </div>
        </div>

        <div id="status" class="mt-6 text-center text-sm font-medium"></div>
    </div>

    <script>
        // Ta configuration validée
        const _supabase = supabase.createClient(
            'https://eycpromikafqjkiubueh.supabase.co', 
            'sb_publishable_Kyg7s5KiLMYrUll4YwT0OA_mFsQ2onr'
        );

        async function publierArticle() {
            const btn = document.getElementById('btn-publier');
            const status = document.getElementById('status');
            const file = document.getElementById('fichier').files[0];
            const titre = document.getElementById('titre').value;
            const prix = document.getElementById('prix').value;
            const categorie = document.getElementById('categorie').value;

            if (!file || !titre || !prix) {
                alert("Remplis tout Ouzaif !");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = "Envoi en cours... ⏳";
            status.innerText = "Téléchargement de l'image...";

            try {
                // 1. Upload vers le bucket (ton réglage Public Upload)
                const fileName = `${Date.now()}_${file.name}`;
                const { data: uploadData, error: uploadError } = await _supabase.storage
                    .from('articles-images')
                    .upload(fileName, file);

                if (uploadError) throw uploadError;

                // 2. Récupérer l'URL publique
                const { data: urlData } = _supabase.storage
                    .from('articles-images')
                    .getPublicUrl(fileName);

                const imageUrl = urlData.publicUrl;

                // 3. Enregistrer dans la table articles
                status.innerText = "Enregistrement en base de données...";
                const { error: dbError } = await _supabase
                    .from('articles')
                    .insert([{ titre, prix, categorie, image_url: imageUrl }]);

                if (dbError) throw dbError;

                status.innerText = "✅ Succès ! Le délice est en ligne.";
                status.className = "mt-6 text-center text-green-600 font-bold";
                
                // Reset formulaire
                document.getElementById('titre').value = '';
                document.getElementById('prix').value = '';
            } catch (err) {
                console.error(err);
                status.innerText = "❌ Erreur : " + err.message;
                status.className = "mt-6 text-center text-red-600 font-bold";
            } finally {
                btn.disabled = false;
                btn.innerHTML = "PUBLIER MAINTENANT";
            }
        }
    </script>
</body>
  </html>
