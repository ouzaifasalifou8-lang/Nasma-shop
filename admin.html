<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nasma Admin | Gestion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 p-4">
    <div class="max-w-md mx-auto bg-white rounded-3xl shadow-2xl p-8 border border-blue-100">
        <h1 class="text-2xl font-black text-[#1a3a5f] mb-6 tracking-tighter italic text-center">NASMA DASHBOARD</h1>
        
        <div class="space-y-4">
            <input type="text" id="titre" placeholder="Nom du délice (ex: Jus d'Orange)" class="w-full p-4 bg-gray-50 rounded-xl border-none ring-1 ring-gray-200">
            <input type="number" id="prix" placeholder="Prix en CFA" class="w-full p-4 bg-gray-50 rounded-xl border-none ring-1 ring-gray-200">
            <input type="number" id="remise" placeholder="Remise % (0 si aucune)" class="w-full p-4 bg-gray-50 rounded-xl border-none ring-1 ring-gray-200">
            
            <select id="categorie" class="w-full p-4 bg-gray-50 rounded-xl border-none ring-1 ring-gray-200">
                <option value="Jus">Jus Naturels</option>
                <option value="Cake">Cakes & Gâteaux</option>
                <option value="Yaourt">Yaourts</option>
            </select>

            <div class="p-4 border-2 border-dashed border-blue-200 rounded-xl text-center">
                <input type="file" id="fichier" accept="image/*,video/*" class="text-xs">
            </div>

            <button onclick="publier()" id="btn" class="w-full bg-[#1a3a5f] text-white font-bold py-5 rounded-xl shadow-lg active:scale-95 transition-all">
                METTRE EN LIGNE 🚀
            </button>
            <p id="msg" class="text-center text-sm font-bold"></p>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient('https://eycpromikafqjkiubueh.supabase.co', 'sb_publishable_Kyg7s5KiLMYrUll4YwT0OA_mFsQ2onr');

        async function publier() {
            const btn = document.getElementById('btn');
            const file = document.getElementById('fichier').files[0];
            const msg = document.getElementById('msg');

            if(!file || !document.getElementById('titre').value) return alert("Remplis tout !");

            btn.disabled = true; btn.innerText = "Chargement... ⏳";
            
            try {
                const fName = `${Date.now()}_${file.name}`;
                await _supabase.storage.from('articles-images').upload(fName, file);
                const { data: { publicUrl } } = _supabase.storage.from('articles-images').getPublicUrl(fName);

                const { error } = await _supabase.from('articles').insert([{
                    titre: document.getElementById('titre').value,
                    prix: document.getElementById('prix').value,
                    remise_pct: document.getElementById('remise').value || 0,
                    categorie: document.getElementById('categorie').value,
                    image_url: publicUrl
                }]);

                if(error) throw error;
                msg.innerText = "✅ Produit ajouté avec succès !";
                msg.className = "text-center text-green-600 font-bold mt-4";
            } catch (e) {
                msg.innerText = "❌ Erreur : " + e.message;
                msg.className = "text-center text-red-600 font-bold mt-4";
            } finally {
                btn.disabled = false; btn.innerText = "METTRE EN LIGNE 🚀";
            }
        }
    </script>
</body>
</html>
