<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nasma | Boutique Gourmande</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#f8faff] text-[#1a3a5f] pb-24">

    <header class="bg-white px-6 py-8 shadow-sm rounded-b-[40px] text-center">
        <h1 class="text-4xl font-black tracking-tighter text-[#1a3a5f]">NASMA</h1>
        <p class="text-gray-400 text-[10px] uppercase tracking-[0.2em] mt-2 font-bold">Douceurs & Fraîcheur</p>
    </header>

    <main class="p-6">
        <div id="gallery" class="grid grid-cols-1 gap-8">
            <p class="text-center text-gray-400 animate-pulse">Chargement des délices...</p>
        </div>
    </main>

    <div id="ai-chat-btn" class="fixed bottom-6 right-6 bg-gradient-to-tr from-blue-600 to-indigo-900 p-4 rounded-full shadow-2xl cursor-pointer active:scale-90 transition-all z-50">
        <span class="text-2xl">🤖</span>
    </div>

    <div id="ai-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden z-[60] flex items-end justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[32px] overflow-hidden shadow-2xl">
            <div class="bg-[#1a3a5f] p-6 text-white flex justify-between items-center">
                <h3 class="font-bold text-lg">Conseillère Nasma IA</h3>
                <button onclick="toggleAI()" class="text-white/50 text-2xl">&times;</button>
            </div>
            <div id="ai-response" class="p-6 max-h-80 overflow-y-auto text-sm leading-relaxed text-gray-700 italic border-b border-gray-50">
                "Bonjour ! Je connais toutes les recettes de Nasma. Que puis-je vous suggérer de délicieux aujourd'hui ?"
            </div>
            <div class="p-4 bg-gray-50 flex gap-2">
                <button onclick="demanderIA('Que me conseilles-tu selon les produits en stock ?')" class="flex-1 bg-white border border-blue-100 text-blue-700 py-3 rounded-xl text-[10px] font-bold shadow-sm">CONSEILLE-MOI</button>
                <button onclick="demanderIA('Quel est le produit le plus gourmand ?')" class="flex-1 bg-white border border-blue-100 text-blue-700 py-3 rounded-xl text-[10px] font-bold shadow-sm">LE PLUS GOURMAND ?</button>
            </div>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient(
            'https://eycpromikafqjkiubueh.supabase.co', 
            'sb_publishable_Kyg7s5KiLMYrUll4YwT0OA_mFsQ2onr'
        );

        const GEMINI_API_KEY = 'AIzaSyC3veGRffUXfQ_l7vLsogJ4E0SnM8aAlBA';

        // Charger les articles
        async function chargerBoutique() {
            const { data: articles } = await _supabase.from('articles').select('*').order('created_at', { ascending: false });
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';

            articles.forEach(item => {
                const isVideo = item.image_url.includes('.mp4');
                gallery.innerHTML += `
                    <div class="bg-white rounded-[32px] overflow-hidden shadow-xl border border-blue-50/50">
                        <div class="h-72 bg-gray-100 relative">
                            ${isVideo ? `<video src="${item.image_url}" autoplay muted loop class="w-full h-full object-cover"></video>` : `<img src="${item.image_url}" class="w-full h-full object-cover">`}
                            <div class="absolute top-4 right-4 bg-white/90 backdrop-blur px-4 py-2 rounded-full shadow-lg"><span class="font-black text-[#1a3a5f]">${item.prix} CFA</span></div>
                        </div>
                        <div class="p-6 flex justify-between items-center">
                            <div><h3 class="text-xl font-bold text-[#1a3a5f]">${item.titre}</h3><p class="text-xs text-blue-400 font-bold uppercase">${item.categorie || 'Gourmandise'}</p></div>
                            <a href="https://wa.me/22788198822?text=Bonjour Nasma, je souhaite commander : ${item.titre}" class="bg-[#1a3a5f] p-4 rounded-2xl shadow-lg active:scale-95 transition-transform"><svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg></a>
                        </div>
                    </div>`;
            });
        }

        // Logique IA
        function toggleAI() { document.getElementById('ai-modal').classList.toggle('hidden'); }
        document.getElementById('ai-chat-btn').onclick = toggleAI;

        async function demanderIA(question) {
            const responseBox = document.getElementById('ai-response');
            responseBox.innerHTML = "Analyse des délices en cours... ⏳";
            
            const { data: articles } = await _supabase.from('articles').select('titre, prix, categorie');
            const inventaire = articles.map(a => `${a.titre} (${a.prix} CFA)`).join(', ');
            
            const prompt = `Tu es l'assistante de vente de Nasma. Voici nos produits : ${inventaire}. Réponds très poliment, avec gourmandise et de manière concise (2 phrases max). \nClient: ${question}`;

            try {
                const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await resp.json();
                responseBox.innerHTML = data.candidates[0].content.parts[0].text;
            } catch (e) {
                responseBox.innerHTML = "Désolée, je suis un peu occupée en cuisine. Réessayez dans un instant !";
            }
        }

        chargerBoutique();
    </script>
</body>
</html>
