<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nasma | Douceurs & Fraîcheur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .product-card { transition: transform 0.3s ease; }
        .product-card:active { transform: scale(0.98); }
    </style>
</head>
<body class="bg-gray-50 text-[#1a3a5f]">

    <header class="p-8 text-center bg-white border-b border-gray-100">
        <h1 class="text-4xl font-black tracking-tighter italic uppercase">NASMA</h1>
        <p class="text-[10px] uppercase tracking-[0.3em] text-gray-400 mt-2 font-bold">Douceurs & Fraîcheur</p>
    </header>

    <main class="p-6 max-w-lg mx-auto mb-24">
        <div id="grille-produits" class="grid grid-cols-1 gap-8">
            <p class="text-center text-gray-400 italic py-10">Chargement de la vitrine... ⏳</p>
        </div>
    </main>

    <button onclick="ouvrirIA()" class="fixed bottom-6 right-6 w-16 h-16 bg-blue-600 rounded-full shadow-2xl flex items-center justify-center animate-pulse z-40">
        <span class="text-2xl">🤖</span>
    </button>

    <div id="modal-ia" class="hidden fixed inset-0 bg-black/60 flex items-end sm:items-center justify-center p-4 z-50 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-[32px] p-8 shadow-2xl relative">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h3 class="font-black italic text-xl">Conseillère Nasma</h3>
                    <p class="text-[10px] text-blue-500 font-bold uppercase tracking-widest">Propulsé par Groq ⚡</p>
                </div>
                <button onclick="fermerIA()" class="text-gray-400 text-3xl">&times;</button>
            </div>
            
            <div id="ai-response" class="bg-blue-50 p-6 rounded-2xl text-sm leading-relaxed mb-6 min-h-[120px] max-h-[300px] overflow-y-auto">
                Bonjour ! Je suis Nasma. Comment puis-je vous régaler aujourd'hui ? 😊
            </div>

            <div class="grid grid-cols-2 gap-3">
                <button onclick="demanderIA('Conseille-moi un délice')" class="bg-blue-600 text-white text-[10px] font-bold py-4 rounded-xl uppercase tracking-wider">Conseille-moi</button>
                <button onclick="demanderIA('Quelles sont les promos ?')" class="border-2 border-blue-600 text-blue-600 text-[10px] font-bold py-4 rounded-xl uppercase tracking-wider">Promotions ?</button>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURATION DES APIS
        const SB_URL = 'https://eycpromikafqjkiubueh.supabase.co';
        const SB_KEY = 'sb_publishable_Kyg7s5KiLMYrUll4YwT0OA_mFsQ2onr';
        const GROQ_KEY = 'Gsk_NFCEK4I6rX3mNE7YmNklWGdyb3FYu7l9SOUb4C7nfU4g6jQ3vezv';

        const sb = supabase.createClient(SB_URL, SB_KEY);

        // 1. CHARGER LES PRODUITS DEPUIS SUPABASE
        async function chargerProduits() {
            const container = document.getElementById('grille-produits');
            try {
                const { data: articles, error } = await sb.from('articles').select('*').order('created_at', { ascending: false });

                if (error) throw error;

                if (articles.length === 0) {
                    container.innerHTML = "<p class='text-center text-gray-400'>Aucun produit disponible pour le moment.</p>";
                    return;
                }

                container.innerHTML = articles.map(a => `
                    <div class="product-card bg-white rounded-[32px] overflow-hidden shadow-sm border border-gray-100">
                        <div class="relative">
                            <img src="${a.image_url}" class="w-full h-80 object-cover" onerror="this.src='https://via.placeholder.com/400x500?text=Image+indisponible'">
                            <div class="absolute top-4 right-4 bg-white/90 px-4 py-2 rounded-full font-bold text-sm shadow-sm">
                                ${a.prix} CFA
                            </div>
                            ${a.remise_pct > 0 ? `<div class="absolute top-4 left-4 bg-red-500 text-white px-4 py-2 rounded-full font-black text-[10px] uppercase shadow-lg animate-bounce">-${a.remise_pct}%</div>` : ''}
                        </div>
                        <div class="p-6 flex justify-between items-center">
                            <div>
                                <h2 class="text-xl font-bold">${a.titre}</h2>
                                <p class="text-[10px] text-blue-500 font-bold uppercase tracking-widest">${a.categorie || 'Délicatesse'}</p>
                            </div>
                            <a href="https://wa.me/227XXXXXXXX?text=Bonjour Nasma, je souhaite commander : ${a.titre}" class="bg-[#1a3a5f] p-4 rounded-2xl shadow-lg">
                                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                            </a>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                container.innerHTML = "<div class='text-center p-10 bg-red-50 rounded-3xl text-red-500 font-bold'>Erreur de connexion à la boutique.</div>";
            }
        }

        // 2. FONCTIONS IA (GROQ + ENTRAÎNEMENT DYNAMIQUE)
        function ouvrirIA() { document.getElementById('modal-ia').classList.remove('hidden'); }
        function fermerIA() { document.getElementById('modal-ia').classList.add('hidden'); }

        async function demanderIA(question) {
            const respBox = document.getElementById('ai-response');
            respBox.innerHTML = "<span class='animate-pulse'>Nasma réfléchit... ⚡</span>";

            try {
                // Récupération des données dynamiques
                const { data: produits } = await sb.from('articles').select('titre, prix, remise_pct');
                const { data: savoir } = await sb.from('ia_connaissances').select('instruction').order('created_at', { ascending: false }).limit(3);

                const menu = produits.map(p => `${p.titre} (${p.prix} CFA, Promo: ${p.remise_pct}%)`).join(', ');
                const instructions = savoir ? savoir.map(s => s.instruction).join('. ') : "";

                const systemPrompt = `Tu es la conseillère de vente de "Nasma", une boutique de douceurs au Niger. 
                Voici tes produits : ${menu}. 
                Infos de dernière minute : ${instructions}. 
                Sois chaleureuse, utilise des emojis (🍦, 🥤), et encourage le client à commander via WhatsApp. 
                Réponds brièvement et poliment en français.`;

                const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${GROQ_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "llama-3.1-70b-versatile",
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: question }
                        ],
                        temperature: 0.7
                    })
                });

                const data = await res.json();
                respBox.innerHTML = data.choices[0].message.content;

            } catch (e) {
                respBox.innerHTML = "Oups ! Ma connexion avec la cuisine est un peu lente. Réessayez ? 🥖";
                console.error(e);
            }
        }

        // Initialisation
        chargerProduits();
    </script>
</body>
</html>
