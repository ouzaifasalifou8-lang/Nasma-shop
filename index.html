<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nasma | Douceurs & Fraîcheur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-gray-50 text-[#1a3a5f]">

    <header class="p-8 text-center bg-white">
        <h1 class="text-4xl font-black tracking-tighter italic">NASMA</h1>
        <p class="text-[10px] uppercase tracking-[0.3em] text-gray-400 mt-2 font-bold">Douceurs & Fraîcheur</p>
    </header>

    <main class="p-6 max-w-lg mx-auto">
        <div id="grille-produits" class="grid grid-cols-1 gap-8">
            <p class="text-center text-gray-400 italic">Préparation de la vitrine... ⏳</p>
        </div>
    </main>

    <button onclick="ouvrirIA()" class="fixed bottom-6 right-6 w-16 h-16 bg-blue-600 rounded-full shadow-2xl flex items-center justify-center animate-bounce">
        <span class="text-2xl">🤖</span>
    </button>

    <div id="modal-ia" class="hidden fixed inset-0 bg-black/40 flex items-end sm:items-center justify-center p-4 z-50">
        <div class="bg-white w-full max-w-md rounded-[32px] p-8 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-black italic text-xl">Conseillère Nasma IA</h3>
                <button onclick="fermerIA()" class="text-gray-400 text-2xl">&times;</button>
            </div>
            <div id="ai-response" class="bg-blue-50 p-6 rounded-2xl text-sm leading-relaxed mb-6 min-h-[100px]">
                Bonjour ! Je suis là pour vous aider à choisir le meilleur délice. Que voulez-vous savoir ?
            </div>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="demanderIA('Conseille-moi un produit')" class="bg-blue-600 text-white text-[10px] font-bold py-3 rounded-full uppercase">Conseille-moi</button>
                <button onclick="demanderIA('Y a-t-il des promotions ?')" class="border-2 border-blue-600 text-blue-600 text-[10px] font-bold py-3 rounded-full uppercase">Promotions ?</button>
            </div>
        </div>
    </div>

    <script>
        // Ta configuration validée
        const _supabase = supabase.createClient('https://eycpromikafqjkiubueh.supabase.co', 'sb_publishable_Kyg7s5KiLMYrUll4YwT0OA_mFsQ2onr');
        const GEMINI_KEY = 'AIzaSyC3veGRffUXfQ_l7vLsogJ4E0SnM8aAlBA';

        // 1. Charger les produits
        async function chargerProduits() {
            const container = document.getElementById('grille-produits');
            const { data: articles, error } = await _supabase.from('articles').select('*').order('created_at', { ascending: false });

            if (error) {
                container.innerHTML = "Erreur de connexion à la boutique.";
                return;
            }

            container.innerHTML = articles.map(a => `
                <div class="bg-white rounded-[32px] overflow-hidden shadow-sm border border-gray-100">
                    <div class="relative">
                        <img src="${a.image_url}" class="w-full h-72 object-cover">
                        <div class="absolute top-4 right-4 bg-white/90 px-4 py-2 rounded-full font-bold text-xs shadow-sm">
                            ${a.prix} CFA
                        </div>
                        ${a.remise_pct > 0 ? `<div class="absolute top-4 left-4 bg-red-500 text-white px-4 py-2 rounded-full font-black text-[10px] uppercase shadow-lg">-${a.remise_pct}% OFF</div>` : ''}
                    </div>
                    <div class="p-6 flex justify-between items-center">
                        <div>
                            <h2 class="text-xl font-bold">${a.titre}</h2>
                            <p class="text-[10px] text-blue-500 font-bold uppercase tracking-widest">${a.categorie}</p>
                        </div>
                        <a href="https://wa.me/227XXXXXXXX?text=Bonjour Nasma, je commande : ${a.titre}" class="bg-[#1a3a5f] p-4 rounded-2xl shadow-lg">
                            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                        </a>
                    </div>
                </div>
            `).join('');
        }

        // 2. Fonctions IA
        function ouvrirIA() { document.getElementById('modal-ia').classList.remove('hidden'); }
        function fermerIA() { document.getElementById('modal-ia').classList.add('hidden'); }

        async function demanderIA(question) {
            const respBox = document.getElementById('ai-response');
            respBox.innerHTML = "Nasma réfléchit... 👩‍🍳";

            try {
                const { data: articles } = await _supabase.from('articles').select('titre, prix, remise_pct');
                const menu = articles.map(a => `${a.titre} (${a.prix} CFA, Remise: ${a.remise_pct}%)`).join(', ');

                const prompt = `Tu es l'assistante commerciale de Nasma au Niger. Nos produits : ${menu}. 
                Réponds poliment avec des emojis. Si un produit a une remise > 0, propose-le en priorité absolue. 
                Le client demande : ${question}`;

                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await res.json();
                respBox.innerHTML = data.candidates[0].content.parts[0].text;
            } catch (e) {
                respBox.innerHTML = "Désolée, ma connexion avec la cuisine est coupée ! Réessaie ? 🥖";
            }
        }

        chargerProduits();
    </script>
</body>
</html>
