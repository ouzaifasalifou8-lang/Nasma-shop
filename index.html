<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nasma | Douceurs & Fraîcheur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .product-card { transition: transform 0.3s ease; }
        .product-card:active { transform: scale(0.98); }
        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-50 text-[#1a3a5f]">

    <header class="p-8 text-center bg-white border-b border-gray-100">
        <h1 class="text-4xl font-black tracking-tighter italic uppercase">NASMA</h1>
        <p class="text-[10px] uppercase tracking-[0.3em] text-gray-400 mt-2 font-bold">Douceurs & Fraîcheur</p>
    </header>

    <main class="p-6 max-w-lg mx-auto mb-24">
        <div id="grille-produits" class="grid grid-cols-1 gap-8">
            <p class="text-center text-gray-400 italic py-10">Préparation de vos délices... ⏳</p>
        </div>
    </main>

    <button onclick="ouvrirIA()" class="fixed bottom-6 right-6 w-16 h-16 bg-blue-600 rounded-full shadow-2xl flex items-center justify-center animate-bounce z-40">
        <span class="text-2xl">🤖</span>
    </button>

    <div id="modal-ia" class="hidden fixed inset-0 bg-black/60 flex items-end sm:items-center justify-center z-50 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-t-[32px] sm:rounded-[32px] p-6 shadow-2xl flex flex-col h-[80vh] sm:h-[600px] relative">
            
            <div class="flex justify-between items-center mb-4 border-b pb-4">
                <div>
                    <h3 class="font-black italic text-xl text-blue-900">Nasma IA</h3>
                    <p class="text-[10px] text-blue-500 font-bold uppercase tracking-widest">Conseillère de vente</p>
                </div>
                <button onclick="fermerIA()" class="text-gray-400 text-3xl">&times;</button>
            </div>

            <div id="chat-box" class="flex-1 overflow-y-auto space-y-4 p-2 text-sm">
                <div class="bg-blue-50 p-4 rounded-2xl rounded-tl-none mr-10 shadow-sm border border-blue-100">
                    Bonjour ! Je suis Nasma. Comment puis-je vous régaler aujourd'hui ? 😊
                </div>
            </div>

            <div class="mt-4 flex gap-2 bg-gray-50 p-2 rounded-2xl border border-gray-100">
                <input type="text" id="user-input" onkeypress="handleKey(event)" placeholder="Posez une question..." class="flex-1 p-3 bg-transparent outline-none text-sm">
                <button onclick="envoyerMessage()" class="bg-blue-600 text-white px-5 py-3 rounded-xl font-bold text-xs uppercase tracking-widest shadow-lg active:scale-95 transition-transform">
                    OK
                </button>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://eycpromikafqjkiubueh.supabase.co';
        const SB_KEY = 'sb_publishable_Kyg7s5KiLMYrUll4YwT0OA_mFsQ2onr';
        const GROQ_KEY = 'Gsk_NFCEK4I6rX3mNE7YmNklWGdyb3FYu7l9SOUb4C7nfU4g6jQ3vezv';
        const WHATSAPP_NUM = '22788198822'; // Ton numéro

        const sb = supabase.createClient(SB_URL, SB_KEY);

        // 1. Charger les produits
        async function chargerProduits() {
            const container = document.getElementById('grille-produits');
            try {
                const { data: articles, error } = await sb.from('articles').select('*').order('created_at', { ascending: false });
                if (error) throw error;

                if (articles.length === 0) {
                    container.innerHTML = "<p class='text-center text-gray-400'>Aucun produit en stock pour le moment.</p>";
                    return;
                }

                container.innerHTML = articles.map(a => `
                    <div class="product-card bg-white rounded-[32px] overflow-hidden shadow-sm border border-gray-100">
                        <div class="relative">
                            <img src="${a.image_url}" class="w-full h-80 object-cover" onerror="this.src='https://via.placeholder.com/400x500?text=Produit+Frais'">
                            <div class="absolute top-4 right-4 bg-white/95 px-4 py-2 rounded-full font-bold text-sm shadow-md text-blue-900">
                                ${a.prix} CFA
                            </div>
                            ${a.remise_pct > 0 ? `<div class="absolute top-4 left-4 bg-red-500 text-white px-4 py-2 rounded-full font-black text-[10px] uppercase shadow-lg animate-pulse">-${a.remise_pct}%</div>` : ''}
                        </div>
                        <div class="p-6">
                            <div class="flex justify-between items-start mb-3">
                                <div>
                                    <h2 class="text-xl font-bold text-blue-900">${a.titre}</h2>
                                    <p class="text-[10px] text-blue-500 font-bold uppercase tracking-[0.2em]">${a.categorie || 'FRAÎCHEUR'}</p>
                                </div>
                                <a href="https://wa.me/${WHATSAPP_NUM}?text=Bonjour Nasma, je souhaite commander : ${a.titre}" class="bg-[#1a3a5f] p-4 rounded-2xl shadow-xl hover:scale-105 transition-transform">
                                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                                </a>
                            </div>
                            <p class="text-gray-500 text-xs leading-relaxed line-clamp-2">${a.description || 'Une délicatesse fraîchement préparée pour vous.'}</p>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                container.innerHTML = "<div class='text-center p-10 bg-red-50 rounded-3xl text-red-500 font-bold'>Problème de connexion avec la boutique. 🥖</div>";
            }
        }

        // 2. Logique du Chat IA
        function ouvrirIA() { document.getElementById('modal-ia').classList.remove('hidden'); }
        function fermerIA() { document.getElementById('modal-ia').classList.add('hidden'); }
        function handleKey(e) { if(e.key === "Enter") envoyerMessage(); }

        async function envoyerMessage() {
            const input = document.getElementById('user-input');
            const box = document.getElementById('chat-box');
            const question = input.value.trim();
            if(!question) return;

            // Affichage message utilisateur
            box.innerHTML += `<div class="bg-gray-100 p-3 rounded-2xl rounded-tr-none ml-10 text-right text-gray-700 shadow-sm border border-gray-200">${question}</div>`;
            input.value = "";
            box.scrollTop = box.scrollHeight;

            // Affichage "chargement"
            const loadId = "load-" + Date.now();
            box.innerHTML += `<div id="${loadId}" class="bg-blue-50 p-3 rounded-2xl rounded-tl-none mr-10 animate-pulse text-blue-400 font-bold">Nasma réfléchit... ✨</div>`;
            box.scrollTop = box.scrollHeight;

            try {
                const reponse = await demanderIA(question);
                document.getElementById(loadId).remove();
                box.innerHTML += `<div class="bg-blue-50 p-4 rounded-2xl rounded-tl-none mr-10 shadow-sm border border-blue-100 leading-relaxed">${reponse}</div>`;
                box.scrollTop = box.scrollHeight;
            } catch (e) {
                document.getElementById(loadId).innerHTML = "Désolée, j'ai un souci avec ma connexion ! 🥖";
            }
        }

        async function demanderIA(question) {
            // Récupération du contexte
            const { data: produits } = await sb.from('articles').select('titre, prix, description');
            const { data: savoir } = await sb.from('ia_connaissances').select('instruction').order('created_at', { ascending: false }).limit(3);
            
            const catalogue = produits.map(p => `- ${p.titre}: ${p.prix} CFA (${p.description})`).join('\n');
            const infosDerniereMinute = savoir ? savoir.map(s => s.instruction).join('. ') : "";

            const systemPrompt = `Tu es Nasma, une conseillère de vente chaleureuse pour une boutique de délices au Niger. 
            Ton catalogue : \n${catalogue}. 
            Infos importantes : ${infosDerniereMinute}.
            Règles : Sois brève, utilise des emojis (🍦, 🥤), propose toujours de commander sur WhatsApp au ${WHATSAPP_NUM}. Ne parle que des produits disponibles.`;

            const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${GROQ_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: "llama-3.1-70b-versatile",
                    messages: [
                        { role: "system", content: systemPrompt },
                        { role: "user", content: question }
                    ],
                    temperature: 0.7
                })
            });
            const data = await res.json();
            return data.choices[0].message.content;
        }

        // Initialisation
        chargerProduits();
    </script>
</body>
  </html>
